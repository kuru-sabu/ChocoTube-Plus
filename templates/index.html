{% extends "base.html" %}
{% block title %}Choco-tube-plus{% endblock %}
{% block body_class %}page-home{% endblock %}
{% block content %}
<main>
    <section class="trending-section">
      <div class="trending-header">
        <h2 class="trending-title">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="20" height="20"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"/><polyline points="16 7 22 7 22 13"/></svg>
          トレンド動画
        </h2>
        <div class="region-wrap">
          <label for="regionSelect" class="region-label">地域</label>
          <select id="regionSelect" class="region-select"></select>
        </div>
      </div>

      <div class="category-tabs" id="categoryTabs">
        <button class="category-tab active" data-category="">🔥 総合</button>
        <button class="category-tab" data-category="music">🎵 音楽</button>
        <button class="category-tab" data-category="gaming">🎮 ゲーム</button>
        <button class="category-tab" data-category="news">📰 ニュース</button>
        <button class="category-tab" data-category="movies">🎬 映画</button>
      </div>

      <div id="trendingGrid" class="video-grid">
        <div class="loading-state">
          <div class="spinner"></div>
          <p>読み込み中...</p>
        </div>
      </div>
    </section>
  </main>
{% endblock %}
