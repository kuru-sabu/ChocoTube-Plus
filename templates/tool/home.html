{% extends "base.html" %}
{% block title %}ツール — Choco-tube-plus{% endblock %}
{% block body_class %}tool-page{% endblock %}
{% block content %}
<main class="tool-main">
  <div class="tool-container">
    <h1 class="tool-heading">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="28" height="28"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94l-6.91 6.91a2.12 2.12 0 0 1-3-3l6.91-6.91a6 6 0 0 1 7.94-7.94l-3.76 3.76z"/></svg>
      ツール
    </h1>
    <p class="tool-desc">各種便利ツールのまとめページです。</p>
    <div class="tool-grid">
      <a href="/tool/youtube" class="tool-card">
        <div class="tool-card-icon">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="36" height="36"><path d="M23.5 6.2a3 3 0 0 0-2.1-2.1C19.5 3.5 12 3.5 12 3.5s-7.5 0-9.4.6A3 3 0 0 0 .5 6.2C0 8.1 0 12 0 12s0 3.9.5 5.8a3 3 0 0 0 2.1 2.1C4.5 20.5 12 20.5 12 20.5s7.5 0 9.4-.6a3 3 0 0 0 2.1-2.1C24 15.9 24 12 24 12s0-3.9-.5-5.8zM9.75 15.5V8.5l6.5 3.5-6.5 3.5z"/></svg>
        </div>
        <div class="tool-card-body">
          <span class="tool-card-title">YouTubeサイト一覧</span>
          <span class="tool-card-sub">プライバシー重視の代替フロントエンド集</span>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" class="tool-card-arrow"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
      <a href="/tool/game" class="tool-card">
        <div class="tool-card-icon" style="color: #7c3aed;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="36" height="36"><rect x="2" y="6" width="20" height="12" rx="3"/><path d="M6 12h4m-2-2v4M15 11h.01M17 13h.01"/></svg>
        </div>
        <div class="tool-card-body">
          <span class="tool-card-title">ゲーム一覧</span>
          <span class="tool-card-sub">ブラウザで遊べるゲームを集めたページ</span>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" class="tool-card-arrow"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
      <a href="/tool/programing" class="tool-card">
        <div class="tool-card-icon" style="color: #22c55e;">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="36" height="36"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>
        </div>
        <div class="tool-card-body">
          <span class="tool-card-title">プログラミング</span>
          <span class="tool-card-sub">HTML / CSS / JS /PY をブラウザ上で書いて動かせるツール集</span>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18" class="tool-card-arrow"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    </div>
  </div>
</main>
<style>
.tool-main { padding: 24px 16px 48px; }
.tool-container { max-width: 760px; margin: 0 auto; }
.tool-heading { display: flex; align-items: center; gap: 10px; font-size: 1.5rem; font-weight: 700; margin: 0 0 8px; color: var(--text-primary); }
.tool-desc { color: var(--text-secondary); margin: 0 0 28px; font-size: .95rem; }
.tool-grid { display: flex; flex-direction: column; gap: 12px; }
.tool-card { display: flex; align-items: center; gap: 16px; background: var(--bg-secondary); border: 1px solid var(--border-color, rgba(128,128,128,.2)); border-radius: 12px; padding: 18px 20px; text-decoration: none; color: inherit; transition: background .15s, transform .1s; }
.tool-card:hover { background: var(--bg-tertiary, var(--bg-secondary)); transform: translateY(-1px); }
.tool-card-icon { flex-shrink: 0; color: #ff0000; }
.tool-card-body { flex: 1; display: flex; flex-direction: column; gap: 3px; }
.tool-card-title { font-weight: 600; font-size: 1rem; }
.tool-card-sub { font-size: .82rem; color: var(--text-secondary); }
.tool-card-arrow { flex-shrink: 0; color: var(--text-secondary); }
</style>
{% endblock %}
